<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="PokeApi-UserInput.js" defer></script>
    <title>PokeApi</title>
    <style>
        button:hover {
            cursor: pointer;
            display: inline-block;
        }
        button {
            color: orange;
            border-radius: 13px;
            border: 2px solid orange;
            display: inline-block;
            padding: 0.4%;
            font-size: 100%;
            margin-left: 1%;
        }
        body {
            margin-left: 2%;
        }
        h1 {
            font-size: 250%;
            text-decoration: underline;
            margin-left: 2%;
        }
        h2 {
            font-size: 250%;
            color: orange;
        }
        #erg {
            display: flex;
            flex-wrap: wrap;
            margin-top: 2%;
            margin-left: 2%;
        }
        #erg div {
            width: 18%;
            padding: 1%;
            border: orange 4px solid;
            margin: 2%;
            border-radius: 15px;
        }
        input {
            margin-left: 2%;
            padding: 0.2%;
        }
    </style>
</head>
<body>

    <h1>Request data from PokeApi using AJAX</h1>
    
    <input id="input_name" type="text" placeholder="Pokemon name">
    <button id="submitButton" onclick="loadPokemon()">Submit</button>

    <div id="erg"></div>

</body>
</html>
